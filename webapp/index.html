<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Запись к мастеру</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-color: #1c1e21;
      --hint-color: #65676b;
      --button-color: #0088cc;
      --button-text: #ffffff;
      --input-bg: #f0f2f5;
      --tab-inactive: #b0b3b8;
    }
    body.tg-dark {
      --bg-color: #18191a;
      --card-bg: #242526;
      --text-color: #e4e6eb;
      --hint-color: #b0b3b8;
      --button-color: #2e89ff;
      --input-bg: #3a3b3c;
      --tab-inactive: #65676b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      padding: 24px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    @media (min-width: 600px) {
      .container {
        margin-top: 40px;
        min-height: auto;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 5px; }
    .subtitle { color: var(--hint-color); text-align: center; font-size: 14px; margin-bottom: 20px; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--input-bg);
    }
    .tab {
      flex: 1;
      padding: 12px 16px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--tab-inactive);
      border: none;
      background: transparent;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--button-color);
      color: var(--button-text);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--hint-color); text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 16px;
      box-sizing: border-box;
    }
    .row { display: flex; gap: 10px; }
    .phone-wrap {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border-radius: 10px;
      overflow: hidden;
    }
    .phone-prefix {
      padding: 12px 12px 12px 14px;
      color: var(--hint-color);
      font-size: 16px;
      user-select: none;
    }
    .phone-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      min-width: 0;
    }
    .photo-upload { margin-top: 5px; }
    .photo-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--hint-color);
      cursor: pointer;
      font-size: 14px;
    }
    .photo-upload input[type="file"] { display: none; }
    .photo-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .photo-thumb {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
    }
    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-thumb .remove-photo {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      font-size: 14px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      padding: 0;
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background-color: var(--button-color);
      color: var(--button-text);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    .browser-notice {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      border: 1px solid #ffeeba;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="browserNotice" class="browser-notice">
      ℹ️ Вы открыли приложение вне Telegram. Отправка данных боту недоступна.
    </div>
    <h1>Запись к мастеру</h1>
    <p class="subtitle">Выберите категорию и заполните форму</p>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="nails">💅 Маникюр</button>
      <button type="button" class="tab" data-tab="haircut">✂️ Стрижка</button>
    </div>

    <div id="tab-nails" class="tab-content active">
      <div class="form-group">
        <label>Ваше имя</label>
        <input type="text" id="nameNails" placeholder="Введите имя">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <div class="phone-wrap">
          <span class="phone-prefix">+7</span>
          <input type="tel" id="phoneNails" placeholder="(900) 123-45-67" inputmode="numeric" maxlength="15">
        </div>
      </div>
      <div class="form-group">
        <label>Услуга</label>
        <select id="serviceNails">
          <option value="Маникюр + Гель-лак">Маникюр + Гель-лак</option>
          <option value="Наращивание">Наращивание</option>
          <option value="Педикюр">Педикюр</option>
          <option value="Дизайн ногтей">Дизайн ногтей</option>
        </select>
      </div>
      <div class="row">
        <div class="form-group" style="flex: 1;">
          <label>Дата</label>
          <input type="date" id="dateNails">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Время</label>
          <input type="time" id="timeNails">
        </div>
      </div>
      <div class="form-group">
        <label>Комментарий (необязательно)</label>
        <input type="text" id="commentNails" placeholder="Пожелания, особые пожелания">
      </div>
      <div class="form-group">
        <label>Фото (необязательно)</label>
        <div class="photo-upload">
          <label class="photo-upload-label">
            📷 Добавить фото
            <input type="file" id="photosNails" accept="image/*" multiple>
          </label>
        </div>
        <div class="photo-previews" id="previewNails"></div>
      </div>
    </div>

    <div id="tab-haircut" class="tab-content">
      <div class="form-group">
        <label>Ваше имя</label>
        <input type="text" id="nameHaircut" placeholder="Введите имя">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <div class="phone-wrap">
          <span class="phone-prefix">+7</span>
          <input type="tel" id="phoneHaircut" placeholder="(900) 123-45-67" inputmode="numeric" maxlength="15">
        </div>
      </div>
      <div class="form-group">
        <label>Услуга</label>
        <select id="serviceHaircut">
          <option value="Мужская стрижка">Мужская стрижка</option>
          <option value="Женская стрижка">Женская стрижка</option>
          <option value="Детская стрижка">Детская стрижка</option>
          <option value="Стрижка + борода">Стрижка + борода</option>
          <option value="Окрашивание">Окрашивание</option>
          <option value="Укладка">Укладка</option>
        </select>
      </div>
      <div class="row">
        <div class="form-group" style="flex: 1;">
          <label>Дата</label>
          <input type="date" id="dateHaircut">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Время</label>
          <input type="time" id="timeHaircut">
        </div>
      </div>
      <div class="form-group">
        <label>Комментарий (необязательно)</label>
        <input type="text" id="commentHaircut" placeholder="Пожелания к стрижке">
      </div>
      <div class="form-group">
        <label>Фото (необязательно)</label>
        <div class="photo-upload">
          <label class="photo-upload-label">
            📷 Добавить фото
            <input type="file" id="photosHaircut" accept="image/*" multiple>
          </label>
        </div>
        <div class="photo-previews" id="previewHaircut"></div>
      </div>
    </div>

    <button id="mainBtn" class="btn-submit">ЗАПИСАТЬСЯ</button>
  </div>
  <script>
    const tg = window.Telegram?.WebApp || {};
    const params = new URLSearchParams(location.search);
    const canHttp = params.get('uid') && (params.get('api') || '').replace(/\/$/, '').startsWith('https://');
    const isTelegram = typeof tg.sendData === 'function';
    const canSubmit = canHttp || isTelegram;

    if (tg.initData || isTelegram || canHttp) {
      tg.expand && tg.expand();
      if (tg.colorScheme === 'dark') document.body.classList.add('tg-dark');
    }
    if (!canSubmit) {
      document.getElementById('browserNotice').style.display = 'block';
    }

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    function phoneMask(input) {
      input.addEventListener('input', () => {
        const digits = input.value.replace(/\D/g, '').slice(0, 10);
        let out = '';
        if (digits.length > 0) out += '(' + digits.slice(0, 3);
        if (digits.length >= 3) out += ') ';
        if (digits.length > 3) out += digits.slice(3, 6);
        if (digits.length >= 6) out += '-';
        if (digits.length > 6) out += digits.slice(6, 8);
        if (digits.length >= 8) out += '-';
        if (digits.length > 8) out += digits.slice(8, 10);
        input.value = out;
      });
    }
    document.querySelectorAll('#phoneNails, #phoneHaircut').forEach(phoneMask);

    const photoFiles = { Nails: [], Haircut: [] };
    function setupPhotoInput(suffix) {
      const input = document.getElementById('photos' + suffix);
      const preview = document.getElementById('preview' + suffix);
      input.addEventListener('change', () => {
        for (const f of input.files) {
          if (photoFiles[suffix].length >= 10) break;
          photoFiles[suffix].push(f);
          const div = document.createElement('div');
          div.className = 'photo-thumb';
          const img = document.createElement('img');
          img.src = URL.createObjectURL(f);
          const btn = document.createElement('button');
          btn.className = 'remove-photo';
          btn.textContent = '×';
          btn.onclick = () => {
            const idx = photoFiles[suffix].indexOf(f);
            if (idx > -1) photoFiles[suffix].splice(idx, 1);
            div.remove();
          };
          div.appendChild(img);
          div.appendChild(btn);
          preview.appendChild(div);
        }
        input.value = '';
      });
    }
    setupPhotoInput('Nails');
    setupPhotoInput('Haircut');

    function formatPhone(val) {
      const d = (val || '').replace(/\D/g, '').slice(0, 10);
      return d ? '+7' + d : '';
    }

    document.getElementById('mainBtn').addEventListener('click', async () => {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      const suffix = activeTab === 'nails' ? 'Nails' : 'Haircut';
      const type = activeTab === 'nails' ? 'manicure_booking' : 'haircut_booking';

      const data = {
        type,
        name: document.getElementById('name' + suffix).value?.trim() || '',
        phone: formatPhone(document.getElementById('phone' + suffix).value) || '',
        service: document.getElementById('service' + suffix).value || '',
        date: document.getElementById('date' + suffix).value || '',
        time: document.getElementById('time' + suffix).value || '',
        comment: document.getElementById('comment' + suffix).value?.trim() || '',
      };

      if (!data.name || !data.phone || !data.date || !data.time) {
        alert("Пожалуйста, заполните все поля!");
        return;
      }

      const uid = params.get('uid');
      const apiBase = (params.get('api') || '').replace(/\/$/, '');
      const btn = document.getElementById('mainBtn');

      if (uid && apiBase.startsWith('https://')) {
        btn.disabled = true;
        btn.textContent = 'Отправка...';
        try {
          const photos = photoFiles[suffix] || [];
          let res;
          if (photos.length > 0) {
            const fd = new FormData();
            fd.append('json', JSON.stringify({ uid: Number(uid), ...data }));
            photos.forEach((f, i) => fd.append('photo' + i, f));
            res = await fetch(apiBase + '/booking', { method: 'POST', body: fd });
          } else {
            res = await fetch(apiBase + '/booking', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ uid: Number(uid), ...data }),
            });
          }
          const json = await res.json();
          if (json.ok) {
            if (tg.close) tg.close();
            else alert('✅ Заявка отправлена! Мастер свяжется с вами.');
          } else {
            throw new Error(json.error || 'Ошибка отправки');
          }
        } catch (e) {
          btn.disabled = false;
          btn.textContent = 'ЗАПИСАТЬСЯ';
          alert('Не удалось отправить. Попробуйте ещё раз.');
        }
        return;
      }

      if (isTelegram && tg.sendData) {
        tg.sendData(JSON.stringify(data));
        tg.close();
      } else {
        alert("Форма заполнена! (В Telegram данные ушли бы боту)");
      }
    });
  </script>
</body>
</html>
