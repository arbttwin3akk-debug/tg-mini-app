<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Запись на маникюр</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Запись на маникюр</h1>
        <p class="subtitle" id="user-info">Загружаю данные из Telegram…</p>
      </header>

      <main class="app-main">
        <section class="card">
          <h2>Ваши данные</h2>
          <label class="field">
            <span>Имя</span>
            <input id="name" type="text" placeholder="Как к вам обращаться" />
          </label>

          <label class="field">
            <span>Телефон</span>
            <input id="phone" type="tel" placeholder="+7 xxx xxx xx xx" />
          </label>
        </section>

        <section class="card">
          <h2>Услуга и время</h2>

          <label class="field">
            <span>Услуга</span>
            <select id="service">
              <option value="Маникюр классический">Маникюр классический</option>
              <option value="Маникюр + покрытие гель-лак">Маникюр + гель-лак</option>
              <option value="Коррекция">Коррекция</option>
            </select>
          </label>

          <label class="field">
            <span>Дата</span>
            <input id="date" type="date" />
          </label>

          <label class="field">
            <span>Время</span>
            <input id="time" type="time" />
          </label>

          <label class="field">
            <span>Комментарий (необязательно)</span>
            <textarea id="comment" rows="3" placeholder="Пожелания по дизайну и т.п."></textarea>
          </label>

          <button id="submit">Отправить заявку</button>
          <p id="status" class="status"></p>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
  </html>
