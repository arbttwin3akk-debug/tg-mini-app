# Cloudflare Worker для Telegram-бота (деплой: npm run deploy)
name = "tg-bot-worker"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# BOT_TOKEN задаётся через: npx wrangler secret put BOT_TOKEN
[vars]
WEB_APP_URL = "https://tg-mini-app-6tj.pages.dev/"

# KV для связки клиент ↔ тема в группе. id возьми в Cloudflare: Workers & Pages → KV → своё пространство имён.
[[kv_namespaces]]
binding = "CLIENT_THREADS"
id = "6d6a9f79095b4203a37742c9327a60c3"
