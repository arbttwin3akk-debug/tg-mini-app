# Cloudflare Worker для Telegram-бота (деплой: npm run deploy)
name = "tg-bot-worker"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# BOT_TOKEN задаётся через: npx wrangler secret put BOT_TOKEN
[vars]
# GitHub Pages — часто доступен без VPN (в отличие от Cloudflare)
WEB_APP_URL = "https://arbttwin3akk-debug.github.io/tg-mini-app/"
# URL Worker для HTTP-заявок (нужен для Web App)
WORKER_PUBLIC_URL = "https://tg-bot-worker.from1xtru.workers.dev"
# ID темы «Общее» (0,1,2 — часто General = 0 или 2) — сообщения отсюда рассылаются клиентам
GENERAL_THREAD_ID = "0,1,2"
# true — рассылать любое сообщение; false — только сообщения с ссылками (t.me, https)
BROADCAST_ANY_MESSAGE = "true"

# KV для связки клиент ↔ тема в группе. id возьми в Cloudflare: Workers & Pages → KV → своё пространство имён.
[[kv_namespaces]]
binding = "CLIENT_THREADS"
id = "6d6a9f79095b4203a37742c9327a60c3"
